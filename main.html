<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- links -->

    <link
      rel="stylesheet"
      href="/2025-p2a-web-volny-projekt-FichtnerTobias/css/normalized.css"
    />
    <link
      rel="stylesheet"
      href="/2025-p2a-web-volny-projekt-FichtnerTobias/css/colors-themes.css"
    />
    <link
      rel="stylesheet"
      href="/2025-p2a-web-volny-projekt-FichtnerTobias/css/layout.css"
    />
    <link
      rel="stylesheet"
      href="/2025-p2a-web-volny-projekt-FichtnerTobias/css/components.css"
    />
    <link
      rel="stylesheet"
      href="/2025-p2a-web-volny-projekt-FichtnerTobias/css/responsive.css"
    />
    <link
      rel="stylesheet"
      href="/2025-p2a-web-volny-projekt-FichtnerTobias/css/hovers-animations.css"
    />
    <script
      src="/2025-p2a-web-volny-projekt-FichtnerTobias/js/humburger.js"
      defer
    ></script>
    <title>AI Educated</title>
  </head>
  <body>
    <!---------------------------------HEADER---------------------------------------->

    <header class="header">
      <!-- Navigace -->
      <nav class="header__nav transparent_black">
        <a href="#" class="brand-logo">
          <img
            src="/2025-p2a-web-volny-projekt-FichtnerTobias/Img/galaxy_logo.svg"
            alt="AI Educated logo"
            width="50px"
          />
          <span class="special_text">AI Educated</span>
        </a>
        <button
          class="hamburger"
          aria-label="Toggle menu"
          aria-expanded="false"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>
        <ul class="header__nav-list">
          <li class="header__nav-item special_text_2"><a href="#">kurzy</a></li>
          <li class="header__nav-item special_text_2">
            <a href="#">produkty</a>
          </li>
          <li class="header__nav-item special_text_2">
            <a href="#">zdroje</a>
          </li>
          <li class="header__nav-item special_text_2"><a href="#">ceny</a></li>
        </ul>

        <div class="header__nav-buttons">
          <a href="#" class="header__nav-dev-link">
            <span class="white_text">Pro Vývojáře</span>
            <img
              src="/2025-p2a-web-volny-projekt-FichtnerTobias/Img/ic--round-open-in-new.svg"
              alt="external link"
              width="30px"
            />
          </a>
          <a
            href="#"
            class="header__nav-button header__nav-button--getdemo white_text"
            >Vyžádat demo</a
          >
          <a
            href="#"
            class="header__nav-button header__nav-button--login black_text"
            >Přihlásit se</a
          >
        </div>
      </nav>
      <!-- Nadpis sekce -->
      <div>
        <div class="header__main">
          <h1 class="header__main-title white_text">
            Budoucnost vývoje je v <span class="special_text">AI</span>. Najdi
            svého pomocníka pro svůj <span class="special_text">projekt</span> /
            <span class="special_text">zájem</span>
          </h1>
        </div>
        <p class="header__main-subtitle white_text">
          Pomůžeme ti zmapovat vzkušenosti ktere potřebuješ a naučíme tě
          pracovat se nejruznějšími druhy AI
        </p>
        <a
          href="#"
          class="header__main-button--register white_text main_button blur"
        >
          zaregistrujte se</a
        >
      </div>
    </header>
    <!---------------------------------MAIN CONTENT---------------------------------------->
    <main>
      <section class="ai">
        <figure class="ai_card">
          <img src="" alt="" class="ai_card--logo" />ChatGPT<span
            class="ai_card--title"
          ></span>
          <figcaption class="ai_card--description">
            Ohromný ekosystém nástrojů a integrací Tisíce vlastních GPT,
            napojení na Zapier, Make.com, rozšíření pro prohlížeče, pluginy pro
            Notion a Obsidian.
          </figcaption>
        </figure>
        <figure class="ai_card">
          <img src="" alt="" class="ai_card--logo" />Gemini<span
            class="ai_card--title"
          ></span>
          <figcaption class="ai_card--description">
            Multimodální práce (text + obrázky + video + zvuk najednou) Gemini
            dosahuje 87,6 % na Video-MMMU. Práce s textem a jazykem + analýza a
            vysvětlování.
          </figcaption>
        </figure>
        <figure class="ai_card">
          <img src="" alt="" class="ai_card--logo" />Anthropic Claude<span
            class="ai_card--title"
          ></span>
          <figcaption class="ai_card--description">
            Kódování a vývojářské nástroje Anthropic vlastní 54 % trhu firemního
            kódování a Claude Code se stal nástrojem s miliardovými příjmy.
          </figcaption>
        </figure>
        <figure class="ai_card">
          <img src="" alt="" class="ai_card--logo" />Copilot<span
            class="ai_card--title"
          ></span>
          <figcaption class="ai_card--description">
            Integrace do Microsoft 365 - Copilot má přístup ke všemu, co jsi
            napsal za poslední rok v Outlooku, Wordu, Teams a SharePointu +
            Shrnutí e-mailů a schůzek.
          </figcaption>
        </figure>
        <figure class="ai_card">
          <img src="" alt="" class="ai_card--logo" />Grok<span
            class="ai_card--title"
          ></span>
          <figcaption class="ai_card--description">
            Reálný čas a aktuální informace. Díky napojení přímo na X (Twitter)
            vidí trendy a diskuse v reálném čase, ne s týdenním zpožděním.
          </figcaption>
        </figure>
        <figure class="ai_card">
          <img src="" alt="" class="ai_card--logo" />Perplexity<span
            class="ai_card--title"
          ></span>
          <figcaption class="ai_card--description">
            Výzkum s citacemi vezme složitou otázku, prohledá aktuální web a do
            10 sekund ti podá syntetizovanou odpověď. Je to spíš
            superinteligentní vyhledávač.
          </figcaption>
        </figure>
      </section>
      <section class="sidecontent"></section>
      <section class="curses"></section>
    </main>
  </body>
</html>
